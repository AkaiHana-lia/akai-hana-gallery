<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Akai Hana Design Studio</title>
    <meta name="description" content="" data-i18n-meta="seo.description" />
    <meta name="theme-color" content="#050506" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://akaihanagallery.com/" data-canonical />
    <link rel="alternate" hreflang="es" href="https://akaihanagallery.com/?lang=es" />
    <link rel="alternate" hreflang="en" href="https://akaihanagallery.com/?lang=en" />
    <link rel="alternate" hreflang="x-default" href="https://akaihanagallery.com/" />
    <link rel="icon" href="./assets/logo/akai-hana-mark.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="./assets/images/hero-akai-hana-gallery.png" />
    <link rel="stylesheet" href="./src/styles/styles.css?v=pop-culture-i18n-01" />
    <link rel="manifest" href="./site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Akai Hana Design Studio" data-i18n-meta="seo.ogTitle" />
    <meta property="og:description" content="" data-i18n-meta="seo.ogDescription" />
    <meta property="og:image" content="https://akaihanagallery.com/assets/images/hero-akai-hana-gallery.png" />
    <meta property="og:url" content="https://akaihanagallery.com/" data-og-url />
    <meta name="twitter:card" content="summary_large_image" />
    <script type="application/ld+json" id="schema-data"></script>
  </head>

  <body data-page="home">
    <a class="skip-link" href="#gallery" data-i18n="accessibility.skipToGallery"></a>

    <header class="site-header" data-header>
      <a class="brand" href="#home" data-i18n-attr="aria-label:accessibility.brandHome">
        <img class="brand__mark" src="./assets/logo/akai-hana-mark.svg" width="48" height="48" alt="" aria-hidden="true" />
        <span class="brand__name" data-i18n="brand.name"></span>
      </a>

      <button
        class="nav-toggle"
        type="button"
        data-nav-toggle
        aria-expanded="false"
        aria-controls="site-nav"
        data-i18n-attr="aria-label:accessibility.openMenu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="header-actions">
        <nav class="site-nav" id="site-nav" data-nav data-i18n-attr="aria-label:accessibility.primaryNavigation">
          <a href="#home" data-i18n="nav.home"></a>
          <a href="#gallery" data-i18n="nav.gallery"></a>
          <a href="#stories" data-i18n="nav.stories"></a>
          <a href="#pop-culture" data-i18n="nav.popCulture"></a>
          <a href="#services-contact" data-i18n="nav.servicesContact"></a>
        </nav>

        <div class="language-switcher" role="group" data-language-switcher data-i18n-attr="aria-label:language.selectorLabel">
          <button class="language-button" type="button" data-lang="es" lang="es">ES</button>
          <span aria-hidden="true">/</span>
          <button class="language-button" type="button" data-lang="en" lang="en">EN</button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero" id="home" data-page="home" aria-labelledby="hero-title">
        <div class="hero__image" aria-hidden="true"></div>
        <div class="hero__ambient" aria-hidden="true"></div>
        <div class="hero__content reveal">
          <img
            class="hero__logo"
            src="./assets/logo/akai-hana-logo.svg"
            width="110"
            height="110"
            data-i18n-attr="alt:brand.logoAlt"
          />
          <p class="eyebrow" data-i18n="hero.eyebrow"></p>
          <h1 id="hero-title" class="hero__title">
            <span data-i18n="hero.titleLineOne"></span>
            <span data-i18n="hero.titleLineTwo"></span>
            <span class="hero__title-accent" data-i18n="hero.titleAccent"></span>
          </h1>
          <p class="hero__lead" data-i18n="hero.lead"></p>
          <div class="hero__actions" data-i18n-attr="aria-label:accessibility.heroActions">
            <a class="button button--primary" href="#gallery" data-i18n="hero.primaryCta"></a>
            <a class="button button--ghost" href="#services-contact" data-i18n="hero.secondaryCta"></a>
          </div>
        </div>
        <div class="hero__preview" data-hero-values data-i18n-attr="aria-label:accessibility.galleryValues"></div>
      </section>

      <section class="section intro" data-page="home" data-i18n-attr="aria-label:intro.ariaLabel">
        <div class="section__inner intro__grid">
          <p class="intro__kicker" data-i18n="intro.kicker"></p>
          <h2 data-i18n="intro.title"></h2>
          <p data-i18n="intro.body"></p>
        </div>
      </section>

      <section class="section gallery-section" id="gallery" data-page="gallery" aria-labelledby="gallery-title">
        <div class="gallery-page-hero">
          <div class="section__inner gallery-page-hero__inner">
            <div class="section__heading gallery-page-hero__copy reveal">
            <p class="eyebrow" data-i18n="gallery.eyebrow"></p>
            <h2 id="gallery-title" data-i18n="gallery.title"></h2>
            <p data-i18n="gallery.body"></p>
              <p class="gallery-page-hero__accent" data-i18n="gallery.accent"></p>
              <div class="gallery-studio-note" role="note">
                <span class="hero-value__icon hero-value__icon--brush" aria-hidden="true"></span>
                <div>
                  <strong data-i18n="gallery.studioNote.title"></strong>
                  <p data-i18n="gallery.studioNote.body"></p>
                  <p data-i18n="gallery.studioNote.disclaimer"></p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="section__inner gallery-content">
          <div class="gallery-notice reveal" role="note">
            <span class="gallery-notice__icon" aria-hidden="true" data-i18n="gallery.notice.icon"></span>
            <div>
              <strong data-i18n="gallery.notice.title"></strong>
              <p data-i18n="gallery.notice.body"></p>
            </div>
          </div>

          <div class="filter-bar reveal" role="toolbar" data-filter-bar data-i18n-attr="aria-label:accessibility.filterToolbar"></div>
          <p class="gallery-count" data-gallery-count aria-live="polite"></p>
          <div class="gallery-grid" data-gallery-grid></div>
          <p class="gallery-tagline reveal" data-i18n="gallery.tagline"></p>
          <div class="gallery-cta reveal">
            <a class="button button--ghost" href="#custom-design-form" data-i18n="gallery.fullCollectionCta"></a>
          </div>
        </div>
      </section>

      <section class="section stories-section" id="stories" data-page="stories" aria-labelledby="stories-title">
        <div class="section__inner stories-layout">
          <header class="stories-heading reveal">
            <p class="eyebrow" data-i18n="stories.eyebrow"></p>
            <h2 id="stories-title" data-i18n="stories.title"></h2>
          </header>

          <div class="stories-index" data-stories-index></div>

          <article class="story-reader" data-story-reader hidden>
            <div class="story-reader__top">
              <button class="story-reader__back" type="button" data-story-back data-i18n="stories.backToArchive"></button>
            </div>
            <div data-story-detail></div>
          </article>
        </div>
      </section>

      <section class="section section--quiet" id="collections" aria-labelledby="collections-title">
        <div class="section__inner">
          <div class="section__heading reveal">
            <p class="eyebrow" data-i18n="collections.eyebrow"></p>
            <h2 id="collections-title" data-i18n="collections.title"></h2>
            <p data-i18n="collections.body"></p>
          </div>

          <div class="collection-grid" data-collection-grid></div>
        </div>
      </section>

      <section class="section pop-culture" id="pop-culture" data-page="pop-culture" aria-labelledby="pop-culture-title">
        <div class="section__inner pop-culture__inner reveal">
          <aside class="pop-culture__panel pop-culture__panel--index" aria-labelledby="pop-culture-title">
            <div class="pop-culture__heading">
              <h1 id="pop-culture-title" data-pop-culture-ui="title">POP CULTURE</h1>
              <div class="pop-culture__ornament" aria-hidden="true"></div>
              <p data-pop-culture-ui="lead">Explore modern cultural echoes connected to each Akaihana Story.</p>
            </div>
            <div class="pop-culture__archive-heading" aria-hidden="true">
              <span></span>
              <strong data-pop-culture-ui="exploreByStory">Explore by story</strong>
              <span></span>
            </div>
            <div class="pop-culture__theme-grid" data-pop-culture-themes></div>
            <p class="pop-culture__hint" data-pop-culture-ui="hint">Select a story to explore its pop-culture connections.</p>
          </aside>

          <section class="pop-culture__panel pop-culture__panel--archive" aria-live="polite">
            <div class="pop-culture__archive-header" data-pop-culture-current></div>
            <div class="pop-culture__tabs" role="tablist" data-pop-culture-tabs></div>
            <div class="pop-culture__connections" data-pop-culture-connections></div>
            <div class="pop-culture__empty" data-pop-culture-empty hidden></div>
          </section>
        </div>
        <p class="pop-culture__development-note" data-pop-culture-ui="developmentNote">
          Our Pop Culture library is currently in development. New verified connections are being added progressively.
        </p>
        <div class="pop-culture-detail" data-pop-culture-detail hidden>
          <div class="pop-culture-detail__backdrop" data-pop-culture-close></div>
          <article class="pop-culture-detail__dialog" role="dialog" aria-modal="true" aria-labelledby="pop-culture-detail-title">
            <button class="pop-culture-detail__close" type="button" data-pop-culture-close aria-label="Close pop culture detail">×</button>
            <div class="pop-culture-detail__body" data-pop-culture-detail-body></div>
          </article>
        </div>
      </section>

      <section class="section services-contact" id="services-contact" data-page="services-contact" aria-labelledby="services-contact-title">
        <a class="services-contact__brand-overlay" href="#home" data-i18n-attr="aria-label:accessibility.brandHome">
          <img src="./assets/logo/akai-hana-logo.svg" width="260" height="150" alt="" aria-hidden="true" />
        </a>
        <div class="section__inner services-contact__grid">
          <form class="request-form services-contact__form reveal" id="custom-design-form" name="book-project" data-custom-design-form>
            <div class="form-heading">
              <p class="eyebrow" data-i18n="servicesContact.formEyebrow"></p>
              <p data-i18n="servicesContact.formIntro"></p>
            </div>
            <div class="form-grid">
              <label>
                <span data-i18n="tattooForm.fields.name.label"></span>
                <input type="text" name="name" autocomplete="name" required data-i18n-attr="placeholder:tattooForm.fields.name.placeholder" />
              </label>
              <label>
                <span data-i18n="tattooForm.fields.email.label"></span>
                <input type="email" name="email" autocomplete="email" required data-i18n-attr="placeholder:tattooForm.fields.email.placeholder" />
              </label>
              <label class="form-grid__full">
                <span data-i18n="tattooForm.fields.size.label"></span>
                <select name="size" data-tattoo-select="size" required></select>
              </label>
              <label>
                <span data-i18n="tattooForm.fields.style.label"></span>
                <select name="style" data-tattoo-select="style" required></select>
              </label>
              <label>
                <span data-i18n="tattooForm.fields.colorMode.label"></span>
                <select name="colorMode" data-tattoo-select="colorMode" required></select>
              </label>
              <input type="hidden" name="bodyArea" value="No indicado" />
              <label class="form-grid__full">
                <span data-i18n="tattooForm.fields.meaning.label"></span>
                <textarea name="meaning" rows="4" required data-i18n-attr="placeholder:tattooForm.fields.meaning.placeholder"></textarea>
              </label>
              <label class="form-grid__full">
                <span data-i18n="tattooForm.fields.references.label"></span>
                <textarea name="references" rows="3" data-i18n-attr="placeholder:tattooForm.fields.references.placeholder"></textarea>
              </label>
            </div>
            <button class="button button--primary" type="submit" data-i18n="servicesContact.submit"></button>
            <p class="services-contact__direct-title" data-i18n="servicesContact.directTitle"></p>
            <div class="services-contact__direct" data-i18n-attr="aria-label:servicesContact.directLabel">
              <a
                class="services-contact__direct-card"
                href="https://discord.gg/95FXa8zfA"
                target="_blank"
                rel="noopener noreferrer"
                data-discord-link
              >
                <span data-i18n="discord.label"></span>
                <strong data-i18n="servicesContact.discordShort"></strong>
              </a>
              <a
                class="services-contact__direct-card"
                href="https://mail.google.com/mail/?view=cm&fs=1&to=akaihanadesing%40gmail.com&su=Consulta%20desde%20Akai%20Hana%20Design%20Studio"
                target="_blank"
                rel="noopener noreferrer"
                data-i18n-attr="aria-label:servicesContact.emailAria"
              >
                <span data-i18n="servicesContact.emailLabel"></span>
                <strong data-i18n="contact.email"></strong>
              </a>
            </div>
            <p class="form-legal" data-i18n="tattooForm.legal"></p>
            <p class="form-status" data-tattoo-form-status role="status" aria-live="polite"></p>
          </form>

          <div class="services-contact__copy reveal">
            <p class="eyebrow" data-i18n="servicesContact.eyebrow"></p>
            <h1 id="services-contact-title" data-i18n-html="servicesContact.title"></h1>
            <div class="services-contact__divider" aria-hidden="true"></div>
            <p data-i18n="servicesContact.body"></p>
            <ul class="services-contact__list">
              <li data-i18n="servicesContact.bullets.tattoo"></li>
              <li data-i18n="servicesContact.bullets.illustration"></li>
              <li data-i18n="servicesContact.bullets.japanese"></li>
              <li data-i18n="servicesContact.bullets.visual"></li>
            </ul>
            <blockquote class="services-contact__signature">
              <p data-i18n="servicesContact.quote"></p>
              <cite data-i18n="about.signatureName"></cite>
              <span data-i18n="about.signatureRole"></span>
            </blockquote>
          </div>
        </div>
      </section>
    </main>

    <div class="lightbox" data-lightbox hidden aria-hidden="true">
      <div class="lightbox__backdrop" data-lightbox-close></div>
      <section class="lightbox__dialog" role="dialog" aria-modal="true" aria-labelledby="lightbox-title">
        <button class="lightbox__close" type="button" data-lightbox-close data-i18n-attr="aria-label:lightbox.close">
          <span aria-hidden="true">×</span>
        </button>
        <button class="lightbox__nav lightbox__nav--prev" type="button" data-lightbox-prev data-i18n-attr="aria-label:lightbox.previous">
          <span aria-hidden="true">‹</span>
        </button>
        <figure class="lightbox__figure">
          <div class="project-placeholder project-placeholder--lightbox" data-lightbox-placeholder hidden></div>
          <img data-lightbox-image src="" alt="" />
        </figure>
        <div class="lightbox__content">
          <p class="art-card__meta" data-lightbox-category></p>
          <h3 id="lightbox-title" data-lightbox-title></h3>
          <p class="lightbox__style" data-lightbox-style></p>
          <p data-lightbox-description></p>
          <div class="lightbox__details" data-lightbox-details></div>
          <div class="project-tags lightbox__tags" data-lightbox-tags></div>
          <a
            class="button button--primary lightbox__cta"
            href="https://discord.gg/95FXa8zfA"
            target="_blank"
            rel="noopener noreferrer"
            data-discord-link
            data-i18n="discord.cta"
            data-lightbox-discord-cta
          ></a>
        </div>
        <button class="lightbox__nav lightbox__nav--next" type="button" data-lightbox-next data-i18n-attr="aria-label:lightbox.next">
          <span aria-hidden="true">›</span>
        </button>
      </section>
    </div>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <a class="brand brand--footer" href="#home" data-i18n-attr="aria-label:accessibility.backHome">
          <img class="brand__logo brand__logo--footer" src="./assets/logo/akai-hana-logo.svg" width="190" height="110" alt="" aria-hidden="true" />
          <span class="brand__name sr-only" data-i18n="brand.name"></span>
        </a>
        <p data-i18n="footer.tagline"></p>
      </div>
    </footer>

    <script src="./src/i18n/locales.js?v=pop-culture-i18n-01" defer></script>
    <script src="./src/data/pop-culture.js?v=pop-culture-i18n-01" defer></script>
    <script src="./src/scripts/main.js?v=pop-culture-i18n-01" defer></script>
  </body>
</html>
